spring.application.name=gamevault
spring.security.user.name=user
spring.security.user.password=1234
spring.security.filter.order=10

# Base de datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gamevault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secreto}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# API RAWG.IO
rawg.api.key=${RAWG_API_KEY}
logging.level.root=DEBUG

# JWT Properties
# IMPORTANTE: JWT_SECRET debe definirse siempre como variable de entorno.
# Genera una clave segura con: openssl rand -base64 64
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}