services:
  backend:
    build: ./gamevault
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/gamevault
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secreto
    depends_on:
      - database

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  database:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gamevault
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secreto
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: